<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的网站 - 已开通</title>
    <style>
        /* 全局样式重置，适配不同浏览器 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* 页面主体样式 */
        body {
            font-family: "Microsoft YaHei", Arial, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            min-height: 100vh; /* 确保页面占满屏幕高度 */
            padding-bottom: 60px; /* 给底部备案提示留空间 */
        }

        /* 核心内容区域 */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 80px 20px;
            text-align: center;
        }

        .container h1 {
            font-size: 2.5rem;
            color: #2c3e50;
            margin-bottom: 20px;
        }

        .container p {
            font-size: 1.2rem;
            color: #666;
            line-height: 1.8;
        }

        /* 底部备案提示栏 - 固定在底部 */
        .beian-footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 50px;
            line-height: 50px;
            background-color: #e9ecef;
            text-align: center;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #dee2e6;
        }

        .beian-footer a {
            color: #495057;
            text-decoration: none;
        }

        .beian-footer a:hover {
            text-decoration: underline;
        }

        /* 适配手机端 */
        @media (max-width: 768px) {
            .container h1 {
                font-size: 2rem;
            }
            .container p {
                font-size: 1rem;
            }
            .beian-footer {
                font-size: 12px;
                height: 45px;
                line-height: 45px;
            }
        }
    </style>
</head>
<body>
    <!-- 核心内容 -->
    <div class="container">
        <h1>🎉 我的网站已正式开通！</h1>
        <p>感谢访问，本网站为个人展示用，功能持续完善中～</p>
        <p style="margin-top: 10px;">访问地址：<strong>https://PC591.github.io</strong></p>
    </div>

    <!-- 底部海外服务器备案提示 -->
    <div class="beian-footer">
        本网站服务器部署于海外，依据《互联网信息服务管理办法》，无需进行工信部ICP备案 | 
        <a href="https://beian.miit.gov.cn/" target="_blank">工信部ICP备案查询官网</a>
    </div>
</body>
</html>
