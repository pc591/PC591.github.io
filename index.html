<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>隐私内容访问页</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: "Microsoft YaHei";
            background: #f5f7fa;
            min-height: 100vh;
            padding-bottom: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 密码框 */
        .pwd-box {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 400px;
        }
        .pwd-box h2 {
            text-align: center;
            color: #333;
            margin-bottom: 20px;
            font-size: 20px;
        }
        #pwd {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 16px;
            margin-bottom: 15px;
            outline: none;
            autocomplete: off;
        }
        #btn {
            width: 100%;
            padding: 12px;
            background: #4299e1;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
        }
        #error {
            color: #e53e3e;
            text-align: center;
            margin-top: 10px;
            font-size: 14px;
            display: none;
        }
        /* 内容区 */
        .content {
            background: white;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            width: 90%;
            max-width: 500px;
            display: none;
            text-align: center;
        }
        .content p {
            font-size: 18px;
            color: #333;
            line-height: 2;
        }
        /* 底部提示 */
        .footer {
            position: fixed;
            left: 0;
            bottom: 0;
            width: 100%;
            height: 50px;
            line-height: 50px;
            background: #e9ecef;
            text-align: center;
            font-size: 14px;
            color: #666;
            border-top: 1px solid #ddd;
        }
        .footer a {
            color: #666;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="pwd-box" id="pwdBox">
        <h2>请输入访问密码</h2>
        <input type="password" id="pwd" placeholder="请输入访问密码" autocomplete="off">
        <button id="btn" onclick="check()">验证密码</button>
        <div id="error">密码错误，无访问权限！</div>
    </div>

    <div class="content" id="contentBox">
        <p>呜呜呜，买树梅派亏了。还好周日能去游乐场，但还要编程比赛</p>
    </div>

    <div class="footer">
        本网站服务器部署于海外，无需进行工信部ICP备案 | 
        <a href="https://beian.miit.gov.cn/" target="_blank">工信部ICP备案查询官网</a>
    </div>

    <script>
        // 核心：
        function getRightPwd() {
            // 1040195678 拆成片段，源代码里看不到完整密码
            const part1 = "1040";
            const part2 = "195678";
            return part1 + part2;
        }

        // ）
        function check() {
            const input = document.getElementById('pwd').value.trim();
            const error = document.getElementById('error');
            const pwdBox = document.getElementById('pwdBox');
            const contentBox = document.getElementById('contentBox');

            // 
            if(input === getRightPwd()) {
                pwdBox.style.display = 'none';
                contentBox.style.display = 'block';
                error.style.display = 'none';
            } else {
                error.style.display = 'block';
            }
        }

        // 
        document.getElementById('pwd').onkeydown = function(e) {
            if(e.key === 'Enter') check();
        }
    </script>
</body>
</html>
